name: Build Windows EXE

on:
  push:
    branches: [windows]
  workflow_dispatch:   # permite lanzarlo manualmente desde GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install `
            pyVoIP==1.6.8 `
            customtkinter==5.2.2 `
            sounddevice==0.5.5 `
            numpy==1.26.4 `
            audioop-lts==0.2.2 `
            python-dotenv==1.2.2 `
            pyinstaller `
            pillow

      - name: Convert icon PNG → ICO
        run: |
          python -c "
          from PIL import Image
          img = Image.open('logo.png')
          img.save('UbutelVoIP.ico', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          print('Icono generado: UbutelVoIP.ico')
          "

      - name: Build EXE with PyInstaller
        run: pyinstaller UbutelVoIP_windows.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UbutelVoIP-Windows
          path: dist\UbutelVoIP\
          retention-days: 30
